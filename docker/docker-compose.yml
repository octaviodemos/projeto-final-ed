services:
  # ── Hive Metastore backend ──────────────────────────────────────────
  postgres-hms:
    image: postgres:15-alpine
    container_name: postgres-hms
    environment:
      POSTGRES_DB: ${HMS_DB:-metastore}
      POSTGRES_USER: ${HMS_USER:-hive}
      POSTGRES_PASSWORD: ${HMS_PASSWORD:-hive}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - postgres-hms-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HMS_USER:-hive} -d ${HMS_DB:-metastore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Hive Metastore (catálogo para o Trino Delta connector) ──────────
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      postgres-hms:
        condition: service_healthy
    env_file: ../.env
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-hms:5432/${HMS_DB:-metastore}
        -Djavax.jdo.option.ConnectionUserName=${HMS_USER:-hive}
        -Djavax.jdo.option.ConnectionPassword=${HMS_PASSWORD:-hive}
        -Dhive.aux.jars.path=/opt/hive/auxlib
      HADOOP_CLASSPATH: "/opt/hive/auxlib/*:/opt/hadoop/share/hadoop/tools/lib/*"
    entrypoint: ["/bin/bash", "/hive-entrypoint.sh"]
    volumes:
      - ./hive/entrypoint.sh:/hive-entrypoint.sh
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./jars:/opt/hive/auxlib
    ports:
      - "${HMS_THRIFT_PORT:-9083}:9083"
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/9083"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Trino (query engine) ────────────────────────────────────────────
  trino:
    image: trinodb/trino:435
    container_name: trino
    depends_on:
      hive-metastore:
        condition: service_healthy
    env_file: ../.env
    ports:
      - "${TRINO_PORT:-8080}:8080"
    volumes:
      - ./trino/etc:/etc/trino
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── MinIO ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - ../minio-data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/landing;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      echo 'Buckets criados com sucesso';
      "
    networks:
      - lakehouse

  # ── Trino init (registra tabelas Gold no HMS) ───────────────────────
  trino-init:
    image: trinodb/trino:435
    container_name: trino-init
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./trino/init.sql:/init.sql
    entrypoint: trino --server http://trino:8080 --file /init.sql --ignore-errors
    networks:
      - lakehouse
    restart: "no"

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: h2
      JAVA_TIMEZONE: ${JAVA_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - metabase-data:/metabase-data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Metabase init (cria conta, conexão Trino e dashboard) ───────────
  metabase-init:
    image: python:3.11-slim
    container_name: metabase-init
    depends_on:
      metabase:
        condition: service_healthy
    env_file: ../.env
    volumes:
      - ../metabase/seed.py:/seed.py
    command: python /seed.py
    networks:
      - lakehouse
    restart: "no"

volumes:
  postgres-hms-data:
  metabase-data:

networks:
  lakehouse:
    driver: bridge
